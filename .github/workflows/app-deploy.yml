name: App - Build & Deploy to AKS

on:
  push:
    branches: [master]
    paths:
      - "app/**"
      - "k8s/**"
  workflow_run:
    workflows: ["Terraform - Provision Infrastructure"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

env:
  ACR_NAME: ${{ secrets.TF_ACR_NAME || secrets.ACR_NAME }}
  IMAGE_NAME: my-app
  CLUSTER_NAME: ${{ secrets.TF_CLUSTER_NAME || secrets.AKS_CLUSTER_NAME }}
  RESOURCE_GROUP: ${{ secrets.TF_RESOURCE_GROUP_NAME || secrets.AKS_RESOURCE_GROUP }}

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      acr_login_server: ${{ steps.build.outputs.acr_login_server }}
      image_tag: ${{ steps.build.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}"
            }

      - name: Setup ACR Access
        run: |
          echo "Setting up ACR access..."
          
          # Get ACR name from Terraform secrets or fallback to ACR_NAME
          ACR_NAME="${{ secrets.TF_ACR_NAME }}"
          if [ -z "$ACR_NAME" ]; then
            ACR_NAME="${{ secrets.ACR_NAME }}"
          fi
          
          echo "Using ACR: $ACR_NAME"
          
          # Check if ACR exists and we have access
          if az acr show --name "$ACR_NAME" >/dev/null 2>&1; then
            echo "✓ ACR exists and accessible"
            
            # Try to assign AcrPush role to the service principal for pushing images
            SP_OBJECT_ID=$(az ad sp show --id "${{ secrets.ARM_CLIENT_ID }}" --query id --output tsv)
            ACR_ID=$(az acr show --name "$ACR_NAME" --query id --output tsv)
            
            echo "Assigning AcrPush role to service principal..."
            az role assignment create \
              --assignee "$SP_OBJECT_ID" \
              --role "AcrPush" \
              --scope "$ACR_ID" || echo "Role assignment failed - may already exist"
              
            # Set ACR name for subsequent steps
            echo "ACR_NAME=$ACR_NAME" >> $GITHUB_ENV
          else
            echo "❌ Cannot access ACR: $ACR_NAME"
            exit 1
          fi

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & Push Docker Image
        id: build
        run: |
          IMAGE_TAG=$(date +%Y%m%d)
          ACR_LOGIN_SERVER=$(az acr show --name ${{ env.ACR_NAME }} --query loginServer -o tsv)
          docker build -t $ACR_LOGIN_SERVER/${{ env.IMAGE_NAME }}:$IMAGE_TAG ./app
          docker push $ACR_LOGIN_SERVER/${{ env.IMAGE_NAME }}:$IMAGE_TAG
          echo "acr_login_server=$ACR_LOGIN_SERVER" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

  release:
    name: Release to AKS
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}"
            }

      - name: Set AKS Context
        run: |
          az aks get-credentials \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CLUSTER_NAME }} \
            --overwrite-existing

      - name: Deploy to AKS
        run: |
          sed -i "s|ACR_LOGIN_SERVER|${{ needs.build.outputs.acr_login_server }}|g" k8s/deployment.yaml
          sed -i "s|IMAGE_TAG|${{ needs.build.outputs.image_tag }}|g" k8s/deployment.yaml
          echo "📋 Final deployment manifest:"
          cat k8s/deployment.yaml
          echo "🚀 Applying deployment..."
          kubectl apply -f k8s/deployment.yaml
          
          echo "⏳ Waiting for deployment to be ready..."
          kubectl rollout status deployment/my-app --timeout=300s

      - name: Debug Deployment Issues
        if: failure()
        run: |
          echo "🔍 Debugging deployment issues..."
          echo "📊 Deployment status:"
          kubectl get deployment my-app -o wide
          echo "📦 Pod status:"
          kubectl get pods -l app=my-app -o wide
          echo "📋 Pod descriptions:"
          kubectl describe pods -l app=my-app
          echo "📝 Pod logs:"
          kubectl logs -l app=my-app --tail=100 || echo "No logs available"
          echo "🔧 Events:"
          kubectl get events --sort-by=.metadata.creationTimestamp

      - name: Verify Deployment
        run: |
          echo "✅ Deployment completed successfully!"
          kubectl get deployment my-app
          kubectl get pods -l app=my-app
          kubectl get service my-app
